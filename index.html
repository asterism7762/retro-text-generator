<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レトロ文字ジェネレーター</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="secret-trigger" style="cursor: pointer; user-select: none;">レトロ文字ジェネレーター</h1>
        
        <div id="admin-ui" class="hidden">
            <label>【管理モード】画像を選ぶ</label>
            <div class="file-controls">
                <input type="file" id="image-input" accept="image/*">
                <button id="reset-btn" type="button">クリア</button>
            </div>
            <hr style="border: 1px dashed #444; margin: 15px 0;">
        </div>
        
        <label>文字を入力（改行できます）</label>
        <textarea id="text-input">わりと&#13;どうでも&#13;いい</textarea>
        
        <label style="margin-top:15px;">プレビュー</label>
        <div class="preview-area">
            <canvas id="preview-canvas"></canvas>
        </div>
        
        <button id="download-btn">画像をつくる</button>

        <div id="result-wrap" class="result-img-wrap">
            <label>↓スマホはここを【長押し】で保存！</label>
            <img id="result-img" src="" alt="生成画像">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
